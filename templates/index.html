<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Infrastructure Assistant</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
        }
        header { 
            background: #1e293b; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 { margin: 0; font-size: 1.5rem; color: #38bdf8; }
        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 1rem;
        }
        .message { 
            padding: 12px 16px; 
            border-radius: 8px; 
            max-width: 80%; 
            word-wrap: break-word;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .user-msg { 
            background: #0ea5e9; 
            align-self: flex-end; 
            color: white;
        }
        .bot-msg { 
            background: #334155; 
            align-self: flex-start; 
            border: 1px solid #475569;
        }
        .input-bar { 
            background: #1e293b; 
            padding: 20px; 
            display: flex; 
            gap: 10px;
        }
        input { 
            flex: 1; 
            background: #0f172a; 
            border: 1px solid #475569; 
            color: white; 
            padding: 12px; 
            border-radius: 6px; 
            outline: none;
        }
        input:focus { border-color: #38bdf8; }
        button { 
            background: #0ea5e9; 
            color: white; 
            border: none; 
            padding: 10px 24px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #0284c7; }
    </style>
</head>
<body>

    <header>
        <h1>AI DevOps Assistant</h1>
    </header>

    <div id="chat-container"></div>

    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Ask about Docker, Kubernetes, Nginx...">
        <button onclick="sendRequest()">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');

        async function sendRequest() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-msg');
            userInput.value = '';

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });
                
                const data = await response.json();
                appendMessage(data.answer || data.error, 'bot-msg');

            } catch (error) {
                appendMessage("Error: Failed to connect to backend", 'bot-msg');
            }
        }

        function appendMessage(content, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendRequest();
        });
    </script>
</body>
</html>
